<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>内省ジャーナル</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sand:   #f2ede4;
      --ink:    #1a1208;
      --muted:  #9a8060;
      --accent: #c47a20;
      --border: #ddd5c4;
      --white:  #ffffff;
      --card:   #faf7f2;
    }

    body {
      min-height: 100vh;
      background: var(--sand);
      color: var(--ink);
      font-family: 'Hiragino Mincho ProN', 'Noto Serif JP', Georgia, serif;
      padding-bottom: 80px;
    }

    /* ── Layout ── */
    .wrap { max-width: 680px; margin: 0 auto; padding: 0 0 60px; }

    /* ── Header ── */
    .header { padding: 36px 24px 0; margin-bottom: 28px; }
    .header-row { display: flex; justify-content: space-between; align-items: flex-start; }
    .header-eyebrow {
      font-size: 10px; letter-spacing: .35em; color: var(--muted);
      margin-bottom: 6px; font-family: sans-serif; text-transform: uppercase;
    }
    .header-title { font-size: 26px; font-weight: 900; letter-spacing: .02em; }
    .header-date { font-size: 13px; color: var(--muted); margin-top: 4px; }
    .header-line {
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
      margin-top: 16px;
    }

    /* ── Btn edit ── */
    .btn-edit {
      background: none; border: 1px solid var(--border); color: var(--muted);
      padding: 7px 13px; border-radius: 20px; font-size: 12px;
      cursor: pointer; font-family: sans-serif; margin-top: 8px;
      white-space: nowrap;
    }
    .btn-edit:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Tab Nav ── */
    .tab-nav {
      display: flex; border-bottom: 1px solid var(--border);
      margin-bottom: 32px; padding: 0 24px;
    }
    .tab-btn {
      padding: 10px 20px; background: none; border: none;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      font-size: 13px; cursor: pointer; font-family: sans-serif;
      letter-spacing: .06em; color: var(--muted); transition: all .15s;
    }
    .tab-btn.active { border-bottom-color: var(--accent); color: var(--accent); font-weight: 700; }

    /* ── Tab panels ── */
    .tab-panel { display: none; padding: 0 24px; }
    .tab-panel.active { display: block; }

    /* ── Section label ── */
    .section-label {
      font-size: 10px; letter-spacing: .25em; color: var(--muted);
      font-family: sans-serif; margin-bottom: 20px;
    }

    /* ── Question block ── */
    .q-block { margin-bottom: 28px; }
    .q-head { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; }
    .q-num {
      font-size: 10px; font-family: sans-serif; color: var(--accent);
      letter-spacing: .1em; padding-top: 5px; min-width: 18px;
    }
    .q-label { font-size: 15px; font-weight: 700; line-height: 1.5; letter-spacing: .02em; }
    .q-divider { height: 1px; background: var(--border); margin: 16px 0 0; opacity: .5; }

    textarea {
      width: 100%; padding: 13px 14px;
      border-radius: 10px; border: 1.5px solid var(--border);
      background: var(--white); font-size: 14px; line-height: 1.8;
      color: var(--ink); resize: vertical; outline: none;
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      transition: border-color .2s, background .2s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea.filled { border-color: var(--accent); background: #fffdf9; }

    /* ── Buttons ── */
    .btn-save {
      width: 100%; padding: 16px; background: var(--ink); color: var(--white);
      border: none; border-radius: 12px; font-size: 15px; font-weight: 700;
      cursor: pointer; letter-spacing: .08em; font-family: sans-serif;
      transition: background .3s;
    }
    .btn-save.saved { background: #3a8a5a; }

    /* ── Card ── */
    .card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 14px; padding: 20px; margin-bottom: 14px;
    }
    .card-label {
      font-size: 11px; letter-spacing: .2em; color: var(--muted);
      font-family: sans-serif; margin-bottom: 14px;
    }

    /* ── Input fields ── */
    input[type="text"], input[type="number"], input[type="date"] {
      padding: 9px 11px; border-radius: 8px;
      border: 1.5px solid var(--border); background: var(--white);
      font-size: 13px; color: var(--ink); outline: none;
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    }
    input[type="text"]:focus,
    input[type="number"]:focus,
    input[type="date"]:focus { border-color: var(--accent); }

    /* ── KPI Row ── */
    .kpi-row {
      display: flex; gap: 6px; align-items: center;
      margin-bottom: 8px; flex-wrap: wrap;
    }
    .kpi-row .kpi-name { flex: 2 1 100px; }
    .kpi-row .kpi-num  { width: 68px; }
    .kpi-row .kpi-unit { width: 44px; }
    .kpi-rate { font-size: 13px; font-weight: 700; min-width: 44px; font-family: sans-serif; }
    .kpi-rate.green  { color: #2a7a4a; }
    .kpi-rate.yellow { color: #c07020; }
    .kpi-rate.red    { color: #b03020; }
    .btn-remove {
      background: none; border: none; color: #c0a080;
      font-size: 18px; cursor: pointer; padding: 0 4px; line-height: 1;
    }

    /* ── Add KPI button ── */
    .btn-add-kpi {
      background: #ebe5d8; color: var(--accent); border: none;
      padding: 6px 12px; border-radius: 20px; font-size: 12px;
      cursor: pointer; font-family: sans-serif;
    }
    .btn-add-kpi:hover { background: #e0d8c8; }

    /* ── KPI empty state ── */
    .kpi-empty {
      text-align: center; padding: 20px 0; color: var(--muted);
      font-size: 13px; background: var(--card); border-radius: 10px;
      font-family: sans-serif;
    }

    /* ── Date range row ── */
    .date-row {
      display: flex; gap: 10px; align-items: center;
    }
    .date-row input { flex: 1; }
    .date-sep { color: var(--muted); font-family: sans-serif; font-size: 12px; }

    /* ── Analyze button ── */
    .btn-analyze {
      width: 100%; padding: 17px;
      background: linear-gradient(135deg, #8b4513, var(--accent));
      color: var(--white); border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      letter-spacing: .1em; font-family: sans-serif;
      box-shadow: 0 4px 20px rgba(196,122,32,.3);
    }
    .btn-analyze:hover { opacity: .9; }

    .analyze-note {
      margin-top: 16px; background: var(--card);
      border-radius: 12px; padding: 16px;
      font-size: 11px; color: var(--muted);
      font-family: sans-serif; line-height: 1.8;
    }

    /* ── History ── */
    details {
      margin-bottom: 10px; border-radius: 12px;
      border: 1px solid var(--border); overflow: hidden;
      background: var(--white);
    }
    summary {
      padding: 16px 20px; cursor: pointer; list-style: none;
      display: flex; justify-content: space-between; align-items: center;
      background: var(--card);
    }
    summary::-webkit-details-marker { display: none; }
    .summary-date { font-weight: 700; font-size: 14px; }
    .summary-count { font-size: 11px; color: var(--muted); font-family: sans-serif; }
    .history-body { padding: 20px; }
    .history-q-label {
      font-size: 11px; color: var(--accent); margin-bottom: 3px; font-family: sans-serif;
    }
    .history-q-val {
      font-size: 13px; line-height: 1.75; white-space: pre-wrap;
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      margin-bottom: 16px;
    }
    .history-q-val.empty { color: #bbb; }
    .history-deleted { opacity: .5; }
    .history-deleted-label {
      font-size: 10px; color: var(--muted); margin-bottom: 3px; font-family: sans-serif;
    }
    .history-empty {
      text-align: center; padding: 60px 0; color: var(--muted); font-family: sans-serif;
    }

    /* ── Overlay / Sheet ── */
    .overlay {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,.65);
      display: flex; align-items: flex-end; justify-content: center;
    }
    .sheet {
      width: 100%; max-width: 680px; max-height: 90vh;
      overflow-y: auto; background: #f7f4ee;
      border-radius: 20px 20px 0 0; padding: 28px 24px 48px;
      box-shadow: 0 -8px 40px rgba(0,0,0,.25);
    }
    .sheet-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 20px;
    }
    .sheet-eyebrow {
      font-size: 10px; letter-spacing: .25em; color: var(--muted);
      margin-bottom: 3px; font-family: sans-serif;
    }
    .sheet-title { font-size: 20px; font-weight: 800; color: var(--ink); }
    .btn-close {
      background: #e8e2d8; border: none; border-radius: 50%;
      width: 36px; height: 36px; font-size: 16px;
      color: #5a4a30; cursor: pointer;
    }

    /* ── AI Result ── */
    .ai-loading {
      text-align: center; padding: 48px 0; color: var(--muted);
    }
    .ai-loading .pulse {
      font-size: 28px; margin-bottom: 12px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .ai-loading p { font-size: 13px; letter-spacing: .1em; font-family: sans-serif; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

    .ai-result {
      font-size: 14px; line-height: 1.95; color: #2a1e10;
      white-space: pre-wrap;
    }
    .ai-section-head {
      display: block; color: #8b5e2a; margin-top: 22px; margin-bottom: 6px;
      font-size: 12px; letter-spacing: .1em; font-family: sans-serif; font-weight: 700;
    }

    /* ── Editor ── */
    .editor-note {
      font-size: 12px; color: var(--muted); margin-bottom: 20px;
      font-family: sans-serif; line-height: 1.6;
    }
    .editor-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px; margin-bottom: 10px;
    }
    .editor-card-head {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 10px;
    }
    .editor-qnum { font-size: 11px; color: var(--muted); font-family: sans-serif; }
    .editor-actions { display: flex; gap: 6px; }
    .btn-move {
      background: #e8e2d4; border: none; border-radius: 6px;
      color: var(--muted); padding: 4px 8px; cursor: pointer;
      font-family: sans-serif; font-size: 12px;
    }
    .btn-move:disabled { background: #f0ebe0; color: #ccc; cursor: default; }
    .btn-delete {
      background: #fde8e0; border: none; border-radius: 6px;
      color: #b03020; padding: 4px 10px; cursor: pointer;
      font-family: sans-serif; font-size: 12px;
    }
    .editor-input-label {
      width: 100%; display: block; margin-bottom: 8px; font-size: 14px;
    }
    .editor-input-ph { width: 100%; display: block; font-size: 12px; color: var(--muted); }

    .btn-add-q {
      width: 100%; padding: 13px; margin-top: 8px; margin-bottom: 16px;
      background: #ebe5d8; color: var(--muted);
      border: 1.5px dashed var(--border); border-radius: 12px;
      font-size: 14px; cursor: pointer; font-family: sans-serif;
    }
    .btn-add-q:hover { background: #e0d8c8; }
    .btn-save-editor {
      width: 100%; padding: 16px; background: var(--ink);
      color: var(--white); border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700; cursor: pointer;
      letter-spacing: .08em; font-family: sans-serif;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .header-title { font-size: 22px; }
      .tab-btn { padding: 10px 14px; }
      .kpi-row .kpi-num { width: 60px; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div class="header-row">
      <div>
        <div class="header-eyebrow">Daily Reflection</div>
        <h1 class="header-title">内省ジャーナル</h1>
        <div class="header-date" id="headerDate"></div>
      </div>
      <button class="btn-edit" onclick="openEditor()">⚙ 質問編集</button>
    </div>
    <div class="header-line"></div>
  </div>

  <!-- Tabs -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="today" onclick="switchTab('today')">今日</button>
    <button class="tab-btn" data-tab="history" onclick="switchTab('history')">過去</button>
    <button class="tab-btn" data-tab="analyze" onclick="switchTab('analyze')">分析</button>
  </nav>

  <!-- ── TODAY ── -->
  <div class="tab-panel active" id="tab-today">
    <div class="section-label">REFLECTION</div>
    <div id="questionsContainer"></div>
    <button class="btn-save" id="btnSave" onclick="saveToday()">今日の記録を保存する</button>
  </div>

  <!-- ── HISTORY ── -->
  <div class="tab-panel" id="tab-history">
    <div id="historyContainer"></div>
  </div>

  <!-- ── ANALYZE ── -->
  <div class="tab-panel" id="tab-analyze">

    <!-- Step 1: Period -->
    <div class="card">
      <div class="card-label">STEP 1 — 分析期間</div>
      <div class="date-row">
        <input type="date" id="rangeFrom" />
        <span class="date-sep">〜</span>
        <input type="date" id="rangeTo" />
      </div>
      <div style="font-size:11px;color:var(--muted);margin-top:8px;font-family:sans-serif;">
        空欄で全期間（記録数：<span id="totalDays">0</span>日）
      </div>
    </div>

    <!-- Step 2: KPI -->
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
        <div class="card-label" style="margin-bottom:0">STEP 2 — 仕事の結果入力</div>
        <button class="btn-add-kpi" onclick="addKpi()">＋ 追加</button>
      </div>
      <div id="kpiContainer">
        <div class="kpi-empty">「＋ 追加」から目標と実績を入力してください</div>
      </div>
    </div>

    <button class="btn-analyze" onclick="runAnalyze()">AIで傾向を分析する</button>
    <div class="analyze-note">
      AIは振り返りの内容と入力した数値を照合して、<br>
      「こういう状態のときこういう結果が出ている」という<br>
      あなたの傾向とパターンを教えてくれます。
    </div>
  </div>

</div><!-- /wrap -->

<!-- ── AI Sheet ── -->
<div class="overlay" id="aiOverlay" style="display:none;" onclick="closeAIOnBg(event)">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-header">
      <div>
        <div class="sheet-eyebrow">AI INSIGHT</div>
        <div class="sheet-title">あなたの傾向分析</div>
      </div>
      <button class="btn-close" onclick="closeAI()">✕</button>
    </div>
    <div id="aiContent">
      <div class="ai-loading">
        <div class="pulse">◎</div>
        <p>分析中…</p>
      </div>
    </div>
  </div>
</div>

<!-- ── Editor Sheet ── -->
<div class="overlay" id="editorOverlay" style="display:none;" onclick="closeEditorOnBg(event)">
  <div class="sheet" onclick="event.stopPropagation()">
    <div class="sheet-header">
      <div>
        <div class="sheet-eyebrow">SETTINGS</div>
        <div class="sheet-title">質問の編集</div>
      </div>
      <button class="btn-close" onclick="closeEditor()">✕</button>
    </div>
    <p class="editor-note">
      質問の追加・編集・並び替え・削除ができます。<br>
      ※ 過去の回答データはそのまま保持されます。
    </p>
    <div id="editorList"></div>
    <button class="btn-add-q" onclick="editorAddQ()">＋ 質問を追加</button>
    <button class="btn-save-editor" onclick="saveEditor()">保存する</button>
  </div>
</div>

<script>
// ── Storage keys ────────────────────────────────────────────────
const JOURNAL_KEY   = 'reflection_journal_v3';
const QUESTIONS_KEY = 'reflection_questions_v3';

// ── Default questions ───────────────────────────────────────────
const DEFAULT_QUESTIONS = [
  { id: 'gratitude', label: '今日の感謝　三つ',              placeholder: '① \n② \n③ ' },
  { id: 'seeking',   label: '私は何を求めているのか？',       placeholder: '今、自分が本当に求めているものは…' },
  { id: 'important', label: '私にとって一番大切なものは何か？', placeholder: '最も大切にしている価値観や存在は…' },
  { id: 'books',     label: '私が本に求めているものは？',     placeholder: '知識、癒し、刺激、インスピレーション…' },
  { id: 'doing',     label: 'その為に「今」何をしているのか？', placeholder: '具体的な行動を書いてみよう…' },
  { id: 'effective', label: 'その行動は私の求めているものを手に入れるのに効果的か？', placeholder: '正直に振り返ろう…' },
  { id: 'better',    label: 'もっと良い方法を考え出し、実行してみよう', placeholder: '新しいアプローチやアイデアは…' },
];

// ── Helpers ─────────────────────────────────────────────────────
function uid() { return Math.random().toString(36).slice(2, 9); }
function getTodayKey() { return new Date().toISOString().split('T')[0]; }
function formatDate(d) {
  return new Date(d).toLocaleDateString('ja-JP', {
    year: 'numeric', month: 'long', day: 'numeric', weekday: 'short'
  });
}

// ── Persistence ─────────────────────────────────────────────────
function loadJournal()   { try { return JSON.parse(localStorage.getItem(JOURNAL_KEY)   || '{}'); } catch { return {}; } }
function loadQuestions() { try { return JSON.parse(localStorage.getItem(QUESTIONS_KEY)) || DEFAULT_QUESTIONS; } catch { return DEFAULT_QUESTIONS; } }
function saveJournal(d)  { localStorage.setItem(JOURNAL_KEY,   JSON.stringify(d)); }
function saveQuestions(q){ localStorage.setItem(QUESTIONS_KEY, JSON.stringify(q)); }

// ── State ────────────────────────────────────────────────────────
let questions   = loadQuestions();
let journal     = loadJournal();
let kpis        = [];          // analyze-tab KPI list
let editorDraft = [];          // editor working copy
const todayKey  = getTodayKey();

// ── Init ─────────────────────────────────────────────────────────
document.getElementById('headerDate').textContent = formatDate(todayKey);
renderToday();
renderHistory();
updateTotalDays();

// ── Tab switching ────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + name));
  if (name === 'history') renderHistory();
}

// ── TODAY ────────────────────────────────────────────────────────
function renderToday() {
  const container = document.getElementById('questionsContainer');
  const savedAnswers = (journal[todayKey] && journal[todayKey].answers) || {};
  container.innerHTML = '';

  questions.forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'q-block';

    const rows = q.id === 'gratitude' || i === 0 ? 4 : 3;
    const filled = savedAnswers[q.id] ? ' filled' : '';

    div.innerHTML = `
      <div class="q-head">
        <span class="q-num">${String(i + 1).padStart(2, '0')}</span>
        <label class="q-label" for="q_${q.id}">${escHtml(q.label)}</label>
      </div>
      <textarea id="q_${q.id}" rows="${rows}" placeholder="${escAttr(q.placeholder)}"
        class="${filled}"
        oninput="onAnswerInput(this,'${q.id}')"
      >${escHtml(savedAnswers[q.id] || '')}</textarea>
      ${i < questions.length - 1 ? '<div class="q-divider"></div>' : ''}
    `;
    container.appendChild(div);
  });
}

function onAnswerInput(el, qid) {
  el.classList.toggle('filled', el.value.length > 0);
}

function saveToday() {
  const answers = {};
  questions.forEach(q => {
    const el = document.getElementById('q_' + q.id);
    if (el) answers[q.id] = el.value;
  });

  journal[todayKey] = { answers };
  saveJournal(journal);
  updateTotalDays();

  const btn = document.getElementById('btnSave');
  btn.textContent = '✓ 保存しました';
  btn.classList.add('saved');
  setTimeout(() => {
    btn.textContent = '今日の記録を保存する';
    btn.classList.remove('saved');
  }, 2500);
}

// ── HISTORY ──────────────────────────────────────────────────────
function renderHistory() {
  const container = document.getElementById('historyContainer');
  const dates = Object.keys(journal).sort((a, b) => b.localeCompare(a));

  if (dates.length === 0) {
    container.innerHTML = '<div class="history-empty">まだ記録がありません</div>';
    return;
  }

  container.innerHTML = dates.map(date => {
    const rec = journal[date];
    const answers = rec.answers || {};
    const answered = Object.values(answers).filter(v => v).length;

    // Current questions
    const currentQHtml = questions.map(q => {
      const val = answers[q.id];
      return `
        <div class="history-q-label">${escHtml(q.label)}</div>
        <div class="history-q-val${val ? '' : ' empty'}">${val ? escHtml(val) : '（未記入）'}</div>
      `;
    }).join('');

    // Orphan answers (deleted questions)
    const orphanHtml = Object.entries(answers)
      .filter(([id, v]) => v && !questions.find(q => q.id === id))
      .map(([, val]) => `
        <div class="history-deleted">
          <div class="history-deleted-label">（削除済み質問）</div>
          <div class="history-q-val">${escHtml(val)}</div>
        </div>
      `).join('');

    return `
      <details>
        <summary>
          <span class="summary-date">${formatDate(date)}</span>
          <span class="summary-count">${answered}問回答</span>
        </summary>
        <div class="history-body">
          ${currentQHtml}
          ${orphanHtml}
        </div>
      </details>
    `;
  }).join('');
}

// ── ANALYZE – KPI ────────────────────────────────────────────────
function updateTotalDays() {
  document.getElementById('totalDays').textContent = Object.keys(journal).length;
}

function addKpi() {
  kpis.push({ id: uid(), name: '', target: 0, actual: 0, unit: '' });
  renderKpis();
}

function renderKpis() {
  const c = document.getElementById('kpiContainer');
  if (kpis.length === 0) {
    c.innerHTML = '<div class="kpi-empty">「＋ 追加」から目標と実績を入力してください</div>';
    return;
  }
  c.innerHTML = kpis.map((k, i) => {
    const rate    = k.target > 0 ? Math.round((k.actual / k.target) * 100) : null;
    const rateClass = rate === null ? '' : rate >= 100 ? 'green' : rate >= 80 ? 'yellow' : 'red';
    const rateHtml  = rate !== null
      ? `<span class="kpi-rate ${rateClass}">${rate}%</span>`
      : '';
    return `
      <div class="kpi-row">
        <input type="text"   class="kpi-name" value="${escAttr(k.name)}"   placeholder="項目名" oninput="updateKpi(${i},'name',this.value)" />
        <input type="number" class="kpi-num"  value="${k.target || ''}"    placeholder="目標"   oninput="updateKpi(${i},'target',+this.value)" />
        <input type="number" class="kpi-num"  value="${k.actual || ''}"    placeholder="実績"   oninput="updateKpi(${i},'actual',+this.value)" />
        <input type="text"   class="kpi-unit" value="${escAttr(k.unit)}"   placeholder="単位"   oninput="updateKpi(${i},'unit',this.value)" />
        ${rateHtml}
        <button class="btn-remove" onclick="removeKpi(${i})">×</button>
      </div>
    `;
  }).join('');
}

function updateKpi(i, field, val) {
  kpis[i][field] = val;
  // Re-render only rate labels without full re-render (to preserve focus)
  // Actually just re-render for simplicity (input events fire after value set)
  renderKpis();
}

function removeKpi(i) {
  kpis.splice(i, 1);
  renderKpis();
}

// ── ANALYZE – AI ─────────────────────────────────────────────────
async function runAnalyze() {
  const from = document.getElementById('rangeFrom').value;
  const to   = document.getElementById('rangeTo').value;

  const filtered = Object.fromEntries(
    Object.entries(journal).filter(([d]) => (!from || d >= from) && (!to || d <= to))
  );

  if (Object.keys(filtered).length === 0) {
    alert('該当する記録がありません。');
    return;
  }

  openAI();
  document.getElementById('aiContent').innerHTML = `
    <div class="ai-loading">
      <div class="pulse">◎</div>
      <p>分析中…</p>
    </div>
  `;

  // Build prompt
  const kpiSummary = kpis.length > 0
    ? kpis.map(k => {
        const rate = k.target > 0 ? Math.round((k.actual / k.target) * 100) : null;
        return `・${k.name}：目標 ${k.target}${k.unit} → 実績 ${k.actual}${k.unit}${rate !== null ? `（達成率 ${rate}%）` : ''}`;
      }).join('\n')
    : '（未入力）';

  const sorted = Object.entries(filtered).sort(([a], [b]) => a.localeCompare(b));
  const journalText = sorted.map(([date, rec]) => {
    const answers = questions.map(q =>
      `【${q.label}】\n${(rec.answers && rec.answers[q.id]) || '（未記入）'}`
    ).join('\n\n');
    return `=== ${formatDate(date)} ===\n${answers}`;
  }).join('\n\n━━━━━━━━━━━━━━━━━\n\n');

  const prompt = `あなたは内省・パフォーマンスの専門コーチです。
以下のデータを分析してください。

【今回の仕事の結果（目標 vs 実績）】
${kpiSummary}

【振り返りジャーナル（複数日分）】
${journalText}

このデータを深く読み込み、以下の観点で洞察をまとめてください。日本語で、率直かつ温かみのある文体で書いてください。

**① 振り返りと結果の相関**
「こういう振り返りをしていた期間に、こういう結果が出ている」という具体的なパターンを指摘してください。振り返りの質・内容と数値達成率の関係を読み解いてください。

**② あなたが今いる状態**
振り返りの言葉と数字の両方から読み取れる、このユーザーの現在の精神・行動状態を正直かつ思いやりを持って伝えてください。

**③ 変化の兆しや固定化しているもの**
日を追うごとに変わってきていること、または繰り返されているパターンは何ですか？

**④ 次のステップへの提言**
データに基づいた、具体的で実行可能な一つのアドバイスをください。

ユーザーの実際の言葉や数字を引用しながら分析してください。`;

  try {
    const res  = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }],
      }),
    });
    const data = await res.json();
    const text = (data.content || []).map(b => b.text || '').join('') || '分析できませんでした。';

    // Render with section headers bolded
    const html = escHtml(text).replace(
      /\*\*(.*?)\*\*/g,
      '<strong class="ai-section-head">$1</strong>'
    );
    document.getElementById('aiContent').innerHTML = `<div class="ai-result">${html}</div>`;
  } catch (e) {
    document.getElementById('aiContent').innerHTML = '<p style="color:#b03020;font-family:sans-serif;">エラーが発生しました。</p>';
  }
}

function openAI()  { document.getElementById('aiOverlay').style.display  = 'flex'; }
function closeAI() { document.getElementById('aiOverlay').style.display  = 'none'; }
function closeAIOnBg(e) { if (e.target === e.currentTarget) closeAI(); }

// ── EDITOR ───────────────────────────────────────────────────────
function openEditor() {
  editorDraft = questions.map(q => ({ ...q }));
  renderEditor();
  document.getElementById('editorOverlay').style.display = 'flex';
}
function closeEditor()      { document.getElementById('editorOverlay').style.display = 'none'; }
function closeEditorOnBg(e) { if (e.target === e.currentTarget) closeEditor(); }

function renderEditor() {
  const list = document.getElementById('editorList');
  list.innerHTML = editorDraft.map((q, i) => `
    <div class="editor-card" id="ecard_${i}">
      <div class="editor-card-head">
        <span class="editor-qnum">Q${i + 1}</span>
        <div class="editor-actions">
          <button class="btn-move" onclick="editorMove(${i},-1)" ${i === 0 ? 'disabled' : ''}>↑</button>
          <button class="btn-move" onclick="editorMove(${i},1)"  ${i === editorDraft.length - 1 ? 'disabled' : ''}>↓</button>
          <button class="btn-delete" onclick="editorRemove(${i})">削除</button>
        </div>
      </div>
      <input type="text" class="editor-input-label"
        value="${escAttr(q.label)}"
        placeholder="質問文を入力…"
        oninput="editorDraft[${i}].label=this.value" />
      <input type="text" class="editor-input-ph"
        value="${escAttr(q.placeholder)}"
        placeholder="プレースホルダー（任意）"
        oninput="editorDraft[${i}].placeholder=this.value" />
    </div>
  `).join('');
}

function editorAddQ() {
  editorDraft.push({ id: uid(), label: '', placeholder: '' });
  renderEditor();
}
function editorRemove(i) {
  editorDraft.splice(i, 1);
  renderEditor();
}
function editorMove(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= editorDraft.length) return;
  [editorDraft[i], editorDraft[j]] = [editorDraft[j], editorDraft[i]];
  renderEditor();
}
function saveEditor() {
  questions = editorDraft.map(q => ({ ...q }));
  saveQuestions(questions);
  closeEditor();
  renderToday();
  renderHistory();
}

// ── Escape helpers ───────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
function escAttr(s) {
  return String(s || '').replace(/"/g, '&quot;').replace(/\n/g, '&#10;');
}
